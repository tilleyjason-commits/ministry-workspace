name: Deploy ALFWC app to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/alfwc-mobile/**'
      - 'packages/content-schema/**'
      - 'supabase/**'
      - '.github/workflows/deploy-alfwc-app.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alfwc-app-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-root
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/apps/alfwc-mobile/package-lock.json

      - name: Install dependencies
        working-directory: source/apps/alfwc-mobile
        run: npm ci

      - name: Type check
        working-directory: source/apps/alfwc-mobile
        run: npm run typecheck

      - name: Build web app
        working-directory: source/apps/alfwc-mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_WEB_BASE_PATH: /ministry-workspace/
        run: npm run build:web

      - name: Assemble gh-pages site
        run: |
          rm -rf gh-pages-root/_expo gh-pages-root/assets gh-pages-root/index.html gh-pages-root/favicon.ico gh-pages-root/metadata.json
          cp -r source/apps/alfwc-mobile/dist/* gh-pages-root/
          touch gh-pages-root/.nojekyll
          if [ -d gh-pages-root/alfwc-admin ]; then echo "Keeping existing alfwc-admin deploy"; fi

      - name: Publish gh-pages branch
        working-directory: gh-pages-root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy ALFWC app from ${GITHUB_SHA}"
            git push origin HEAD:gh-pages
          fi